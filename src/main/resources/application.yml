spring:
  application:
    name: scx-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  # 加载项目根目录的 .env 文件（Spring Boot 原生机制，无需第三方库）。
  # .env 用 KEY=VALUE 格式，Spring 以 properties 方式加载，变量注入 ${VAR} 占位符。
  # optional: 表示文件不存在不报错（生产环境无 .env，靠 OS 环境变量注入）。
  # 四种启动方式一致：IDEA / bootRun / java -jar / Docker
  config:
    import: "optional:file:.env[.properties]"

  # 数据源（JPA）
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_DATABASE:scx-backend}
    username: ${DB_USERNAME:scx}
    password: ${DB_PASSWORD:scx_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate   # 用 Flyway 管 schema，Hibernate 仅校验
    properties:
      hibernate:
        format_sql: false
        jdbc.time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6388}
      password: ${REDIS_PASSWORD:}

  # 邮件
  # 敏感凭据（SMTP 授权码）不设默认值，必须通过环境变量注入，避免泄露
  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:noreply@example.com}
    password: ${MAIL_PASSWORD}  # 必须通过环境变量注入，无默认值
    properties:
      mail.smtp.auth: true
      # STARTTLS（587 端口）
      mail.smtp.starttls.enable: ${MAIL_STARTTLS:true}
      # SSL（465 端口，如 QQ 邮箱）
      mail.smtp.ssl.enable: ${MAIL_SSL:false}
      mail.smtp.ssl.trust: ${MAIL_HOST:smtp.example.com}
      mail.smtp.connectiontimeout: 10000
      mail.smtp.timeout: 10000
      mail.smtp.writetimeout: 10000

  # Thymeleaf 模板引擎（邮件模板，默认从 classpath:/templates/ 加载，模板用 mail/xxx 路径）
  thymeleaf:
    cache: false

# 邮件模块开关：false 用 StubMailService（不发真实邮件），true 用 SmtpMailService
mail:
  enabled: ${MAIL_ENABLED:true}
  timeout-ms: ${MAIL_TIMEOUT_MS:30000}

# 自定义应用配置
app:
  env: ${NODE_ENV:development}
  port: ${PORT:3000}

swagger:
  enabled: ${SWAGGER_ENABLED:true}
  title: ${SWAGGER_TITLE:SCX Backend API}
  description: ${SWAGGER_DESCRIPTION:SCX Backend API Documentation}
  version: ${SWAGGER_VERSION:1.0}
  path: ${SWAGGER_PATH:api/docs}

# Springdoc OpenAPI
springdoc:
  # prod 环境通过 swagger.enabled=false 关闭（见 application-prod.yml）
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

# JWT 配置（HMAC-SHA256 令牌密钥）
jwt:
  secret: ${JWT_SECRET:default-secret}

# 超级管理员初始密码（首次启动 SeedService 创建超管用户用，生产环境必须通过环境变量覆盖）
admin:
  initial-password: ${ADMIN_INITIAL_PASSWORD:changeme123}

# Actuator 健康检查
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    # 关闭 K8s 可用性探针分组（liveness/readiness）。
    # 非容器环境下 readiness 默认处于 REFUSING_TRAFFIC(DOWN)，会拖累整体 health 为 DOWN。
    # 待后续部署到 K8s 时再通过 management.health.livenessstate.enabled 等开启。
    livenessstate:
      enabled: false
    readinessstate:
      enabled: false
    # 关闭 mail 健康检查：当前 MAIL_* 为占位配置（smtp.example.com），
    # 配置真实 SMTP 后再开启。
    mail:
      enabled: false

# 服务器端口：与 app.port 对齐
server:
  port: ${PORT:3000}
  servlet:
    context-path: /api   # 全局路由前缀

logging:
  level:
    root: INFO
    com.scx.backend: DEBUG
