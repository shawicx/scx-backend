spring:
  application:
    name: scx-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # 数据源（JPA），对标 prisma.config.ts 的连接串拼装
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_DATABASE:scx-backend}
    username: ${DB_USERNAME:scx}
    password: ${DB_PASSWORD:scx_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate   # 用 Flyway 管 schema，Hibernate 仅校验
    properties:
      hibernate:
        format_sql: false
        jdbc.time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Redis，对标 redis.config.ts
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6388}
      password: ${REDIS_PASSWORD:}

  # 邮件，对标 mail.config.ts
  # 敏感凭据（SMTP 授权码）不设默认值，必须通过环境变量注入，避免泄露
  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:noreply@example.com}
    password: ${MAIL_PASSWORD}  # 必须通过环境变量注入，无默认值
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  # Thymeleaf 模板引擎（邮件模板，默认从 classpath:/templates/ 加载，模板用 mail/xxx 路径）
  thymeleaf:
    cache: false

# 邮件模块开关：false 用 StubMailService（不发真实邮件），true 用 SmtpMailService
mail:
  enabled: ${MAIL_ENABLED:true}
  timeout-ms: ${MAIL_TIMEOUT_MS:30000}

# 自定义应用配置（对标 env.config.ts 的 app/swagger）
app:
  env: ${NODE_ENV:development}
  port: ${PORT:3000}

swagger:
  enabled: ${SWAGGER_ENABLED:true}
  title: ${SWAGGER_TITLE:SCX Backend API}
  description: ${SWAGGER_DESCRIPTION:SCX Backend API Documentation}
  version: ${SWAGGER_VERSION:1.0}
  path: ${SWAGGER_PATH:api/docs}

# JWT 配置（HMAC-SHA256 令牌密钥，对标 scx-service 的 JWT_SECRET）
jwt:
  secret: ${JWT_SECRET:default-secret}

# Actuator 健康检查（对标 health 模块，Step 10 实现业务侧）
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    # 关闭 K8s 可用性探针分组（liveness/readiness）。
    # 非容器环境下 readiness 默认处于 REFUSING_TRAFFIC(DOWN)，会拖累整体 health 为 DOWN。
    # 待后续部署到 K8s 时再通过 management.health.livenessstate.enabled 等开启。
    livenessstate:
      enabled: false
    readinessstate:
      enabled: false
    # 关闭 mail 健康检查：当前 MAIL_* 为占位配置（smtp.example.com），
    # Step 9 实现邮件模块时再开启。
    mail:
      enabled: false

# 服务器端口：与 app.port 对齐
server:
  port: ${PORT:3000}
  servlet:
    context-path: /api   # 全局前缀，对标 main.ts 的 setGlobalPrefix('api')

logging:
  level:
    root: INFO
    com.scx.backend: DEBUG
